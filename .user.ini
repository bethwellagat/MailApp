; WebMail — PHP upload limits for shared hosting.
;
; PHP running as CGI / FastCGI / FPM (the common setup on modern cPanel) reads
; this file and raises the limits below. The stock PHP defaults
; (upload_max_filesize = 2M, post_max_size = 8M) are far below the app's 25 MB
; attachment support, so an ordinary file like a 3 MB Word doc fails to upload
; with "PHP error code 1" (UPLOAD_ERR_INI_SIZE). These ceilings fix that.
;
; Where PHP runs as an Apache module, this file is ignored (harmlessly) — set the
; same three values in cPanel → MultiPHP INI Editor instead.
;
; Changes take effect within a few minutes (PHP caches .user.ini for
; user_ini.cache_ttl, default 300s). These are ceilings only; the app still
; enforces its own 25 MB per-file and 25 MB per-message caps.

upload_max_filesize = 30M
post_max_size = 40M
max_file_uploads = 50
