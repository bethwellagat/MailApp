<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="WorkSpace mail">
  <!-- Full-bleed background: maskable icons may be cropped to a circle/squircle
       by the OS, so the brand colour must reach every edge and the envelope
       must stay within the centre 80% safe zone (51.2-460.8). -->
  <rect width="512" height="512" fill="#0078d4"/>
  <rect x="144" y="186" width="224" height="158" rx="20" fill="none" stroke="#ffffff" stroke-width="24" stroke-linejoin="round"/>
  <polyline points="144 210 256 286 368 210" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
